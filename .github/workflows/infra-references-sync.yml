# Retired PROC-007 Phase 6.2: Infrastructure References Sync
#
# This reusable workflow is intentionally kept as a compatibility shim for
# repositories that still call it. The PROC-007 registry Lambda and DynamoDB
# table were decommissioned during the Phase 1 cleanup, so this workflow no
# longer installs @teric-io/contracts, assumes AWS credentials, or writes to a
# central registry.

name: Sync Infra References (Retired)

on:
  workflow_call:
    inputs:
      config_path:
        description: 'Path to infra.contracts.yaml'
        required: false
        default: 'infra.contracts.yaml'
        type: string
      dry_run:
        description: 'Retained for compatibility; ignored because sync is retired'
        required: false
        default: false
        type: boolean
      aws_account_id:
        description: 'Retained for compatibility; ignored because sync is retired'
        required: false
        default: '449923455111'
        type: string
      contracts_version:
        description: 'Retained for compatibility; ignored because sync is retired'
        required: false
        default: 'bootstrap-v1'
        type: string
    secrets:
      NPM_READ_PACKAGES_TOKEN:
        description: 'Retained for compatibility; ignored because sync is retired'
        required: false
      DEPENDABOT_GITHUB_PACKAGES_TOKEN:
        description: 'Retained for compatibility; ignored because sync is retired'
        required: false

permissions:
  contents: read

jobs:
  retired:
    name: Report Retired Sync
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Report retired PROC-007 sync
        run: |
          if [[ -f "${{ inputs.config_path }}" ]]; then
            HAS_CONFIG="yes"
          else
            HAS_CONFIG="no"
          fi

          echo "::notice title=PROC-007 sync retired::infra.contracts.yaml remains useful as a repo-local dependency declaration, but the central PROC-007 registry sync has been abandoned."
          {
            echo "### PROC-007 Registry Sync Retired"
            echo ""
            echo "This workflow is now a compatibility shim and does not write to a central registry."
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Config path | \`${{ inputs.config_path }}\` |"
            echo "| Config present | $HAS_CONFIG |"
            echo "| Dry run input | \`${{ inputs.dry_run }}\` |"
            echo ""
            echo "Keep \`infra.contracts.yaml\` updated for cross-repo dependency declarations. Do not depend on the old PROC-007 Lambda/DynamoDB registry."
          } >> "$GITHUB_STEP_SUMMARY"
