# Retired PROC-007 Phase 6.6: Infrastructure References Reconciliation
#
# The PROC-007 central infra references registry was abandoned after the Phase 1
# cleanup. This workflow no longer runs on a schedule and no longer installs
# @teric-io/contracts, assumes AWS credentials, or queries DynamoDB.

name: Reconcile Infra References (Retired)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Retained for compatibility; ignored because reconciliation is retired'
        required: false
        default: 'false'
        type: boolean
      auto_repair:
        description: 'Retained for compatibility; ignored because reconciliation is retired'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  retired:
    name: Report Retired Reconciliation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Report retired PROC-007 reconciliation
        run: |
          echo "::notice title=PROC-007 reconciliation retired::The central infra references registry no longer exists; scheduled reconciliation has been disabled."
          {
            echo "### PROC-007 Registry Reconciliation Retired"
            echo ""
            echo "The central PROC-007 Lambda/DynamoDB registry has been abandoned."
            echo "Keep \`infra.contracts.yaml\` files updated as repo-local dependency declarations instead."
          } >> "$GITHUB_STEP_SUMMARY"
